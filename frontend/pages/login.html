<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - ScrollWeaver</title>
    <link rel="stylesheet" href="/frontend/css/pages/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-container">
        <div class="scroll-book" id="scrollBook">
            <!-- 左侧书页 -->
            <div class="book-page left-page">
                <div class="page-content">
                    <!-- 登录表单 -->
                    <div class="form-section" id="loginSection">
                        <h2 class="page-title">登录</h2>
                        <form id="loginForm">
                            <div class="form-group">
                                <label for="loginUsername">用户名</label>
                                <input type="text" id="loginUsername" name="username" required>
                            </div>
                            <div class="form-group">
                                <label for="loginPassword">密码</label>
                                <input type="password" id="loginPassword" name="password" required>
                            </div>
                            <button type="submit" class="submit-btn">登录</button>
                        </form>
                        <p class="switch-form">
                            还没有账号？<a href="#" id="showRegister">立即注册</a>
                        </p>
                        <div class="error-message" id="loginError"></div>
                    </div>
                    
                    <!-- 注册表单 -->
                    <div class="form-section" id="registerSection" style="display: none;">
                        <h2 class="page-title">注册</h2>
                        <form id="registerForm">
                            <div class="form-group">
                                <label for="registerUsername">用户名</label>
                                <input type="text" id="registerUsername" name="username" required>
                            </div>
                            <div class="form-group">
                                <label for="registerEmail">邮箱（可选）</label>
                                <input type="email" id="registerEmail" name="email">
                            </div>
                            <div class="form-group">
                                <label for="registerPassword">密码</label>
                                <input type="password" id="registerPassword" name="password" required>
                            </div>
                            <div class="form-group">
                                <label for="confirmPassword">确认密码</label>
                                <input type="password" id="confirmPassword" name="confirmPassword" required>
                            </div>
                            <button type="submit" class="submit-btn">注册</button>
                        </form>
                        <p class="switch-form">
                            已有账号？<a href="#" id="showLogin">立即登录</a>
                        </p>
                        <div class="error-message" id="registerError"></div>
                    </div>
                </div>
            </div>
            
            <!-- 书脊 -->
            <div class="book-spine"></div>
            
            <!-- 右侧书页 -->
            <div class="book-page right-page">
                <div class="page-content decorative-content">
                    <div class="decorative-title">ScrollWeaver</div>
                    <div class="decorative-subtitle">织梦绘卷</div>
                    <div class="decorative-line"></div>
                    <div class="decorative-text">
                        <p>由 AI 驱动的沉浸式虚拟世界构建</p>
                        <p>与多智能体博弈平台</p>
                        <div class="decorative-features">
                            <p><i class="fas fa-scroll"></i> 造物：一念生万物</p>
                            <p><i class="fas fa-users"></i> 入卷：多角色故事</p>
                            <p><i class="fas fa-brain"></i> 雅集：信念博弈</p>
                        </div>
                    </div>
                    <div class="decorative-pattern"></div>
                </div>
            </div>
        </div>
        
        <!-- 翻页动画层 -->
        <div class="page-flip-overlay" id="pageFlipOverlay">
            <div class="flipping-pages">
                <div class="flip-page"></div>
                <div class="flip-page"></div>
                <div class="flip-page"></div>
                <div class="flip-page"></div>
                <div class="flip-page"></div>
            </div>
        </div>
    </div>

    <script src="/frontend/js/pages/login.js"></script>
</body>
</html>
