<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>世界地图 - ScrollWeaver</title>
    <link rel="stylesheet" href="../css/pages/world-view.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="world-view-container">
        <!-- 顶部导航 -->
        <header class="world-view-header">
            <button class="back-btn" id="backBtn">
                <i class="fas fa-arrow-left"></i>
                <span>返回</span>
            </button>
            <h1 class="world-map-title">世界地图</h1>
            <div class="header-actions">
                <!-- 可以添加其他操作按钮 -->
            </div>
        </header>

        <!-- 地图区域 -->
        <div class="map-section">
            <div class="map-container" id="mapContainer">
                <svg id="worldMap" class="world-map-svg"></svg>
            </div>
        </div>
    </div>

    <script src="../js/pages/world-view.js"></script>
</body>
</html>
