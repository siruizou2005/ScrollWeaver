<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>世界地图 - ScrollWeaver</title>
    <link rel="stylesheet" href="../css/pages/world-view.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Inter:wght@400;600;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="world-view-container" id="worldViewContainer">
        <!-- 顶部导航（仅在查看模式显示） -->
        <header class="world-view-header" id="worldViewHeader">
            <button class="back-btn" id="backBtn">
                <i class="fas fa-arrow-left"></i>
                <span>返回</span>
            </button>
            <h1 class="world-map-title">世界地图</h1>
            <div class="header-actions">
                <!-- 可以添加其他操作按钮 -->
            </div>
        </header>

        <!-- 顶部交互区域（仅在进入世界模式显示） -->
        <div class="session-top-overlay" id="sessionTopOverlay" style="display: none;">
            <!-- 世界动态消息栏 (World Intro) -->
            <div class="world-intro-bar" id="worldIntroBar">
                <div class="intro-icon">
                    <i class="fas fa-bullhorn"></i>
                </div>
                <div class="intro-content">
                    <div class="intro-text-wrapper" id="introTextWrapper">
                        <span class="intro-text" id="introText">正在观测世界动态...</span>
                    </div>
                </div>
            </div>

            <!-- 时间显示 -->
            <div class="time-display" id="timeDisplay">
                <div class="time-card">
                    <i class="fas fa-clock"></i>
                    <span id="timeText">--:--</span>
                </div>
            </div>
        </div>

        <!-- 玩家状态栏（仅在进入世界模式显示） -->
        <div class="player-status-bar" id="playerStatusBar" style="display: none;">
            <div class="player-info-card">
                <div class="player-avatar" id="playerAvatar">
                    <img src="../assets/images/default-icon.jpg" alt="玩家头像">
                </div>
                <div class="player-details">
                    <div class="player-name" id="playerName">加载中...</div>
                    <div class="player-identity" id="playerIdentity">穿越者</div>
                </div>
            </div>
            <div class="player-stats">
                <div class="stat-item" title="才情/内力">
                    <i class="fas fa-magic"></i>
                    <div class="stat-bar-container">
                        <div class="stat-bar talent-bar" id="talentBar" style="width: 60%;"></div>
                    </div>
                    <span id="talentVal">60</span>
                </div>
                <div class="stat-item" title="羁绊/声望">
                    <i class="fas fa-heart"></i>
                    <div class="stat-bar-container">
                        <div class="stat-bar bond-bar" id="bondBar" style="width: 45%;"></div>
                    </div>
                    <span id="bondVal">45</span>
                </div>
                <div class="stat-item" title="精力/行动力">
                    <i class="fas fa-bolt"></i>
                    <div class="stat-bar-container">
                        <div class="stat-bar energy-bar" id="energyBar" style="width: 80%;"></div>
                    </div>
                    <span id="energyVal">80</span>
                </div>
            </div>
        </div>

        <!-- 地图区域 -->
        <div class="map-section" id="mapSection">
            <div class="map-container" id="mapContainer">
                <svg id="worldMap" class="world-map-svg"></svg>
            </div>
        </div>
    </div>

    <!-- 建筑物详情模态框 -->
    <div class="building-modal" id="buildingModal" style="display: none;">
        <div class="modal-overlay" id="modalOverlay"></div>
        <div class="modal-content building-modal-content">
            <button class="modal-close" id="modalClose">
                <i class="fas fa-times"></i>
            </button>
            <div class="building-modal-header">
                <h2 id="buildingModalTitle">建筑物名称</h2>
            </div>
            <div class="building-modal-body">
                <div class="characters-list-section">
                    <h3><i class="fas fa-users"></i> 在此处的人物</h3>
                    <div class="characters-list" id="buildingCharactersList">
                        <!-- 人物列表将在这里动态生成 -->
                    </div>
                </div>
                <div class="actions-section" id="actionsSection">
                    <!-- 操作按钮将在这里动态生成 -->
                </div>
            </div>
        </div>
    </div>

    <!-- 角色选择模态框 -->
    <div class="character-select-modal" id="characterSelectModal" style="display: none;">
        <div class="modal-overlay" id="characterSelectOverlay"></div>
        <div class="modal-content character-select-content">
            <button class="modal-close" id="characterSelectClose">
                <i class="fas fa-times"></i>
            </button>
            <div class="character-select-header">
                <h2>选择私语对象</h2>
            </div>
            <div class="character-select-body">
                <div class="character-select-list" id="characterSelectList">
                    <!-- 角色列表将在这里动态生成 -->
                </div>
            </div>
        </div>
    </div>

    <!-- 世界事件历史模态框 -->
    <div class="history-modal" id="worldHistoryModal" style="display: none;">
        <div class="modal-overlay" id="worldHistoryOverlay"></div>
        <div class="modal-content history-modal-content">
            <button class="modal-close" id="worldHistoryClose">
                <i class="fas fa-times"></i>
            </button>
            <div class="history-modal-header">
                <h2><i class="fas fa-history"></i> 世界见闻录</h2>
            </div>
            <div class="history-modal-body">
                <div class="history-list" id="worldHistoryList">
                    <!-- 历史记录将在这里动态生成 -->
                </div>
            </div>
        </div>
    </div>

    <script src="../js/pages/world-view.js"></script>
</body>

</html>
